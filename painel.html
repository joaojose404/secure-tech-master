<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SECURE TECH - Central de Monitoramento</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --secure-navy: #020617; --secure-gray: #1e293b; --secure-green: #10b981; --secure-accent: #3b82f6; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--secure-navy); color: #f8fafc; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar Profissional */
        #sidebar { width: 380px; background: var(--secure-gray); border-right: 2px solid var(--secure-accent); display: flex; flex-direction: column; padding: 20px; z-index: 1000; box-shadow: 4px 0 15px rgba(0,0,0,0.5); }
        .logo-area { text-align: center; border-bottom: 1px solid #334155; padding-bottom: 20px; margin-bottom: 20px; }
        .logo-area h2 { margin: 0; color: var(--secure-accent); letter-spacing: 1px; }
        
        input { background: #0f172a; border: 1px solid #334155; color: var(--secure-green); padding: 12px; border-radius: 4px; margin-bottom: 10px; width: 100%; box-sizing: border-box; font-weight: bold; }
        button { cursor: pointer; padding: 12px; border: none; border-radius: 4px; font-weight: bold; text-transform: uppercase; transition: 0.3s; width: 100%; }
        .btn-primary { background: var(--secure-accent); color: white; }
        .btn-primary:hover { opacity: 0.8; }
        
        #map { flex: 1; background: #000; }
        .status-badge { font-size: 10px; padding: 2px 6px; border-radius: 10px; background: var(--secure-green); color: black; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="logo-area">
        <h2>SECURE TECH</h2>
        <small>SYSTEM MASTER v2.0</small>
    </div>

    <div style="margin-bottom: 20px;">
        <label>NOME DO CONDOMÍNIO</label>
        <input type="text" id="input-nome" placeholder="Ex: Residencial Prime" oninput="autoToken()">
        <label>TOKEN GERADO</label>
        <input type="text" id="input-token" readonly style="color: #f59e0b;">
        <button class="btn-primary" onclick="gravarCliente()">CADASTRAR NO BANCO</button>
    </div>

    <div id="log-status" style="font-size: 11px; color: #94a3b8; height: 100px; overflow-y: auto; background: #0f172a; padding: 10px; border-radius: 4px;">
        > Sistema iniciado...
    </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
// Chaves profissionais do seu painel
const SB_URL = 'https://onyksqqaeeeznjqzbqry.supabase.co';
const SB_KEY = 'sb_publishable_Qz9ETAer-x34QjYYssuzDw_kDKOiG8-uJ9_vC_S8v7E';

const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

function log(msg) {
    const div = document.getElementById('log-status');
    div.innerHTML += `<br>> ${msg}`;
    div.scrollTop = div.scrollHeight;
}

function autoToken() {
    const nome = document.getElementById('input-nome').value.trim();
    if(nome.length >= 3) {
        const t = nome.substring(0,3).toUpperCase() + "-" + Math.floor(1000 + Math.random() * 9000);
        document.getElementById('input-token').value = t;
    }
}

async function gravarCliente() {
    const nome = document.getElementById('input-nome').value.toUpperCase();
    const token = document.getElementById('input-token').value;

    log("Tentando conexão com banco...");

    try {
        const { data, error } = await supabaseClient
            .from('condominios')
            .insert([{ nome, token }])
            .select();

        if (error) {
            log("ERRO: " + error.message);
            if(error.message.includes("fetch")) {
                alert("ERRO DE PROTOCOLO: O navegador bloqueia conexões locais. Você deve hospedar este HTML em um servidor (GitHub Pages ou Vercel) para funcionar.");
            }
        } else {
            log("SUCESSO: Cliente gravado!");
            alert("✅ Condomínio cadastrado com sucesso!");
        }
    } catch (err) {
        log("FALHA CRÍTICA: " + err.message);
    }
}

// Inicialização do Mapa
const map = L.map('map').setView([-23.206558, -47.034927], 16);
L.tileLayer('https://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}', {
    maxZoom: 20,
    subdomains: ['mt0', 'mt1', 'mt2', 'mt3']
}).addTo(map);
</script>
</body>
</html>
