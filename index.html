<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SECURE TECH - Central de Monitoramento Master</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* Identidade Visual Secure Tech: Navy Blue e Lead Gray */
        :root { 
            --navy: #020617; 
            --lead: #1e293b; 
            --accent: #3b82f6; 
            --success: #10b981; 
            --danger: #ef4444;
            --input-bg: #0f172a; 
        }

        body { 
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--navy); 
            color: #f8fafc; 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
        }
        
        /* Painel Lateral Profissional */
        #sidebar { 
            width: 380px; 
            background: var(--lead); 
            padding: 25px; 
            border-right: 3px solid var(--accent); 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            box-shadow: 10px 0 20px rgba(0,0,0,0.5); 
            z-index: 100; 
            overflow-y: auto;
        }

        .brand-area { 
            text-align: center; 
            border-bottom: 1px solid #334155; 
            padding-bottom: 20px; 
        }

        .brand-area h1 { 
            margin: 0; 
            font-size: 22px; 
            color: var(--accent); 
            letter-spacing: 2px; 
            text-transform: uppercase;
        }

        .brand-area small { color: #94a3b8; font-weight: bold; }
        
        /* Estilização de Campos */
        .field-group { display: flex; flex-direction: column; gap: 8px; }
        
        label { 
            font-size: 11px; 
            color: #94a3b8; 
            font-weight: bold; 
            text-transform: uppercase; 
            margin-left: 2px;
        }

        input { 
            background: var(--input-bg); 
            border: 1px solid #334155; 
            color: var(--success); 
            padding: 14px; 
            border-radius: 6px; 
            outline: none; 
            font-weight: 700; 
            font-size: 14px;
            transition: 0.3s;
        }

        input:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(59, 130, 246, 0.3); }

        button { 
            background: var(--accent); 
            color: white; 
            border: none; 
            padding: 16px; 
            border-radius: 6px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s; 
            text-transform: uppercase; 
            font-size: 13px;
            letter-spacing: 1px;
        }

        button:hover { background: #2563eb; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        
        /* Área do Mapa e Console */
        #map { flex: 1; z-index: 1; }

        .terminal { 
            background: #000; 
            padding: 15px; 
            font-family: 'Courier New', monospace; 
            font-size: 11px; 
            color: #64748b; 
            border-radius: 6px; 
            height: 150px; 
            overflow-y: auto; 
            border: 1px solid #1e293b; 
            margin-top: 10px;
        }

        .token-display { color: #f59e0b !important; background: #1e1b4b !important; border: 1px dashed #f59e0b !important; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="brand-area">
        <h1>SECURE TECH</h1>
        <small>SISTEMA DE GESTÃO CONCIERGE</small>
    </div>

    <div class="field-group">
        <label>Nome do Condomínio / Cliente</label>
        <input type="text" id="nome-cliente" placeholder="Digite o nome oficial" oninput="gerarTokenAutomatico()">
    </div>

    <div class="field-group">
        <label>Chave Gerada (Token de Acesso)</label>
        <input type="text" id="token-cliente" class="token-display" readonly placeholder="Gerando automaticamente...">
    </div>

    <button onclick="salvarNoBanco()">💾 Gravar Cliente na Nuvem</button>

    <div class="field-group">
        <label>Logs do Servidor (Supabase)</label>
        <div class="terminal" id="console-output">> Aguardando instrução master...</div>
    </div>
    
    <div style="text-align: center; margin-top: auto;">
        <small style="color: #475569;">Secure Tech Solutions &copy; 2026</small>
    </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
// Credenciais Oficiais do seu projeto Secure Tech
const SUPABASE_URL = 'https://onyksqqaeeeznjqzbqry.supabase.co';
const SUPABASE_KEY = 'sb_publishable_Qz9ETAer-x34QjYYssuzDw_kDKOiG8-uJ9_vC_S8v7E';

// Inicialização da conexão
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function log(mensagem) {
    const out = document.getElementById('console-output');
    out.innerHTML += `<br>> ${mensagem}`;
    out.scrollTop = out.scrollHeight;
}

function gerarTokenAutomatico() {
    const nome = document.getElementById('nome-cliente').value.trim();
    if(nome.length >= 3) {
        const prefixo = nome.substring(0,3).toUpperCase();
        const rand = Math.floor(1000 + Math.random() * 9000);
        document.getElementById('token-cliente').value = `${prefixo}-${rand}`;
    }
}

async function salvarNoBanco() {
    const nome = document.getElementById('nome-cliente').value.toUpperCase();
    const token = document.getElementById('token-cliente').value;

    if(!nome || !token) {
        alert("Preencha o nome do condomínio antes de gravar.");
        return;
    }

    log("Iniciando gravação segura...");

    const { data, error } = await _supabase
        .from('condominios')
        .insert([{ nome, token }])
        .select();

    if(error) {
        log("ERRO TÉCNICO: " + error.message);
        console.error("Erro Supabase:", error);
        alert("Falha na sincronização. Verifique o console.");
    } else {
        log("SUCESSO: Cliente sincronizado na base de dados.");
        alert("✅ " + nome + " cadastrado com sucesso!");
        
        // Limpa os campos para o próximo
        document.getElementById('nome-cliente').value = "";
        document.getElementById('token-cliente').value = "";
    }
}

// Inicialização do Mapa (Focado na região de Jundiaí/Itupeva conforme suas coordenadas)
const map = L.map('map').setView([-23.206558, -47.034927], 15);

L.tileLayer('https://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}', {
    maxZoom: 20,
    subdomains: ['mt0', 'mt1', 'mt2', 'mt3'],
    attribution: 'Secure Tech - Satélite'
}).addTo(map);

log("Sistema operacional via GitHub Pages.");
</script>

</body>
</html>
