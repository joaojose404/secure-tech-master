<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SECURE TECH - Central de Comando Master</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --navy: #020617; --lead: #1e293b; --accent: #3b82f6; --success: #10b981; --input-bg: #0f172a; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--navy); color: #f8fafc; display: flex; height: 100vh; overflow: hidden; }
        
        #sidebar { width: 400px; background: var(--lead); padding: 25px; border-right: 3px solid var(--accent); display: flex; flex-direction: column; gap: 15px; box-shadow: 10px 0 20px rgba(0,0,0,0.5); z-index: 100; overflow-y: auto; }
        .brand { text-align: center; border-bottom: 1px solid #334155; padding-bottom: 15px; margin-bottom: 10px; }
        .brand h1 { font-size: 22px; color: var(--accent); margin: 0; letter-spacing: 2px; text-transform: uppercase; }
        
        .group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 11px; color: #94a3b8; font-weight: bold; text-transform: uppercase; }
        input { background: var(--input-bg); border: 1px solid #334155; color: var(--success); padding: 14px; border-radius: 6px; outline: none; font-weight: bold; width: 100%; box-sizing: border-box; }
        
        button { background: var(--accent); color: white; border: none; padding: 15px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s; text-transform: uppercase; width: 100%; }
        button:hover { background: #2563eb; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

        .client-list { background: #0f172a; border-radius: 6px; padding: 5px; border: 1px solid #1e293b; max-height: 250px; overflow-y: auto; margin-top: 10px; }
        .client-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #1e293b; font-size: 13px; transition: 0.2s; }
        .client-item:hover { background: #1e293b; }
        .btn-del { background: #ef4444; padding: 5px 10px; font-size: 10px; width: auto; border-radius: 4px; }

        .terminal { background: #000; padding: 12px; font-family: 'Courier New', monospace; font-size: 11px; color: #64748b; border-radius: 6px; height: 100px; overflow-y: auto; border: 1px solid #1e293b; }
        #map { flex: 1; z-index: 1; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="brand">
        <h1>SECURE TECH</h1>
        <small>OPERACIONAL & CONCIERGE</small>
    </div>

    <div class="group">
        <label>Nome do Condomínio</label>
        <input type="text" id="nome-condo" placeholder="Ex: Residencial Alvorada" oninput="gerarToken()">
    </div>

    <div class="group">
        <label>Token de Acesso</label>
        <input type="text" id="token-condo" readonly style="color: #f59e0b;" placeholder="Aguardando nome...">
    </div>

    <button onclick="salvarNoBanco()">💾 Registrar na Nuvem</button>

    <div class="group">
        <label>Clientes Sincronizados</label>
        <div id="lista-clientes" class="client-list"></div>
    </div>

    <div class="group">
        <label>Console de Conexão</label>
        <div id="console" class="terminal">> Autenticando com chave JWT...</div>
    </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// Configurações Oficiais com sua chave JWT válida
const PROJ_ID = 'onxksqqaeegznjqzbqry'; 
const KEY_JWT = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9ueGtzcXFhZWVnem5qcXpicXJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNzYwNTAsImV4cCI6MjA4ODc1MjA1MH0.yFfMpp1Kw-Os-SIERMLt6-Oo6d9wLNPkCRm-Nxn_6Ow'; 

const URL_REST = `https://${PROJ_ID}.supabase.co/rest/v1/condominios`;

function log(msg) {
    const c = document.getElementById('console');
    c.innerHTML += `<br>> ${msg}`;
    c.scrollTop = c.scrollHeight;
}

async function listar() {
    try {
        const res = await fetch(`${URL_REST}?select=*&order=created_at.desc`, {
            method: 'GET',
            headers: { 
                'apikey': KEY_JWT, 
                'Authorization': `Bearer ${KEY_JWT}`,
                'Content-Type': 'application/json'
            }
        });
        
        if(!res.ok) throw new Error("Falha na Resposta");
        
        const data = await res.json();
        const container = document.getElementById('lista-clientes');
        container.innerHTML = "";
        
        data.forEach(c => {
            container.innerHTML += `
                <div class="client-item">
                    <span><b>${c.nome}</b><br><small style="color:#f59e0b">${c.token}</small></span>
                    <button class="btn-del" onclick="remover(${c.id})">APAGAR</button>
                </div>`;
        });
        log("Sincronização OK.");
    } catch (e) { 
        log("Erro: Banco de dados inacessível."); 
    }
}

async function salvarNoBanco() {
    const nome = document.getElementById('nome-condo').value.toUpperCase();
    const token = document.getElementById('token-condo').value;
    
    if(!nome || !token) {
        alert("Preencha o nome do condomínio!");
        return;
    }

    log("Enviando registro...");
    try {
        const res = await fetch(URL_REST, {
            method: 'POST',
            headers: { 
                'apikey': KEY_JWT, 
                'Authorization': `Bearer ${KEY_JWT}`,
                'Content-Type': 'application/json',
                'Prefer': 'return=minimal'
            },
            body: JSON.stringify({ nome, token })
        });

        if(res.ok) {
            log("Sincronizado com Sucesso!");
            document.getElementById('nome-condo').value = "";
            document.getElementById('token-condo').value = "";
            listar();
        } else {
            const err = await res.json();
            log("Erro Banco: " + err.message);
        }
    } catch (e) { log("Falha de conexão."); }
}

async function remover(id) {
    if(confirm("Deseja remover este cliente?")) {
        try {
            await fetch(`${URL_REST}?id=eq.${id}`, {
                method: 'DELETE',
                headers: { 
                    'apikey': KEY_JWT, 
                    'Authorization': `Bearer ${KEY_JWT}` 
                }
            });
            listar();
        } catch (e) { log("Erro ao deletar."); }
    }
}

function gerarToken() {
    const n = document.getElementById('nome-condo').value;
    if(n.length >= 3) {
        document.getElementById('token-condo').value = n.substring(0,3).toUpperCase() + "-" + Math.floor(Math.random() * 9000 + 1000);
    }
}

// Inicialização do Mapa
const map = L.map('map').setView([-23.206558, -47.034927], 16);
L.tileLayer('https://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}', { 
    maxZoom: 20, 
    subdomains: ['mt0','mt1','mt2','mt3'] 
}).addTo(map);

// Inicia a listagem ao abrir
listar();
</script>

</body>
</html>
